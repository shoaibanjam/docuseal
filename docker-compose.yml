# Local dev: builds from Dockerfile.development (dev/test gems, e.g. bullet).
# Production image: docker build -f Dockerfile .
services:
  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile.development
    env_file:
      - .env
    ports:
      - 9090:3000
    volumes:
      - ./docuseal:/data/docuseal
      - ./lib/docuseal.rb:/app/lib/docuseal.rb
      - ./app/controllers/esign_settings_controller.rb:/app/app/controllers/esign_settings_controller.rb
    extra_hosts:
      - 'host.docker.internal:host-gateway'
