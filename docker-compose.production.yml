# Trustseal production deployment for EC2
# Database on same EC2: use host.docker.internal in DATABASE_URL (see .env.example)
# Copy .env.example to .env and set DATABASE_URL, SECRET_KEY_BASE, HOST

services:
  app:
    restart: unless-stopped
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:3000"
    volumes:
      - ./docuseal:/data/docuseal
      - ./lib/docuseal.rb:/app/lib/docuseal.rb
      - ./app/controllers/esign_settings_controller.rb:/app/app/controllers/esign_settings_controller.rb
    env_file:
      - .env
    environment:
      - RAILS_ENV=production
      # DATABASE_URL, SECRET_KEY_BASE, HOST should be in .env
      # Optional: REDIS_URL (if using ElastiCache; omit to use in-container Redis)
      # Optional: FORCE_SSL=true behind HTTPS
      # Optional: AWS_* for S3 attachments
      # Reach PostgreSQL (or other services) on the same EC2 host
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  docuseal_data:
